apiVersion: v1
kind: Secret
metadata:
  name: juicefs-standard-creds
  namespace: default
type: Opaque
stringData:
  # Secret keys are passed as env vars to the entrypoint with the same name.
  # The entrypoint in this demo expects accessKeyId and accessKeySecret.
  #
  # AK/SK compatibility: if you use OSS-style keys (akId/akSecret),
  # mount-proxy will also set accessKeyId/accessKeySecret automatically,
  # so the entrypoint can always use $accessKeyId / $accessKeySecret.
  accessKeyId: "<your-access-key-id>"
  accessKeySecret: "<your-access-key-secret>"
