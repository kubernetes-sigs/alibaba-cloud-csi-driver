apiVersion: v1
kind: Secret
metadata:
  name: juicefs-advanced-creds
  namespace: default
type: Opaque
stringData:
  # These credentials are only needed during `juicefs format`.
  # The advanced entrypoint unsets them after format completes,
  # so the long-running mount process does not expose them.
  accessKeyId: "<your-access-key-id>"
  accessKeySecret: "<your-access-key-secret>"
