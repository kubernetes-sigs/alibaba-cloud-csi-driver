# Demo 2: OSS-compatible PV
#
# This PV follows the same pattern as OSS static volumes:
# all parameters are in volumeAttributes (fuseType, source, bucket, url, otherOpts).
# No pv.spec.mountOptions needed.
#
# For the alternative style using pv.spec.csi.fsType and pv.spec.mountOptions,
# see ../3-standard.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: juicefs-standard-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: customfuseplugin.csi.alibabacloud.com
    volumeHandle: juicefs-standard-pv
    volumeAttributes:
      # fuseType: identifies the FUSE client for metrics and image resolution.
      # Maps to ConfigMap key "fuse-<fuseType>" in csi-plugin.
      fuseType: "juicefs"

      # source: opaque mount source passed to entrypoint as $source.
      source: "redis://:mypassword@redis-host.default.svc:6379/1"

      # bucket: passed to entrypoint as $bucket.
      bucket: "my-jfs-data"

      # url: passed to entrypoint as $url.
      url: "oss-cn-hangzhou-internal.aliyuncs.com"

      # otherOpts: comma-separated mount options passed as $otherOpts.
      otherOpts: "cache-size=1024,buffer-size=300"

      # capacity: volume quota, passed as $capacity to entrypoint.
      # Plain integer or Kubernetes Quantity (e.g. 100, 100Gi, 1Ti).
      # With CustomFuseAutoCapacity feature gate, auto-filled from spec.capacity.storage (with units).
      # Entrypoint strips suffix if needed: capacity=${capacity%Gi}
      capacity: "100Gi"

    nodePublishSecretRef:
      name: juicefs-standard-creds
      namespace: default
