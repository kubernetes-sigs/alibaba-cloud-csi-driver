apiVersion: v1
kind: PersistentVolume
metadata:
  name: juicefs-baked-in-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: customfuseplugin.csi.alibabacloud.com
    volumeHandle: juicefs-baked-in-pv
    volumeAttributes:
      # fuseType identifies the FUSE client for metrics labeling and image resolution.
      # Strongly recommended — without it, defaults to "customfuse", meaning the
      # entire cluster can only have one FUSE client type.
      # Examples: "juicefs", "juicefs3", "juicefs4", "jindo"
      fuseType: "juicefs"
      # No source, url, otherOpts, or nodePublishSecretRef needed —
      # everything is baked into the Dockerfile.
