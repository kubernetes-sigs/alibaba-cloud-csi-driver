apiVersion: v1
kind: PersistentVolume
metadata:
  name: juicefs-baked-in-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: customfuseplugin.csi.alibabacloud.com
    # fsType: identifies the FUSE client for metrics and image resolution.
    # Equivalent to volumeAttributes.fuseType. If both are set, they must match.
    fsType: juicefs
    volumeHandle: juicefs-baked-in-pv
    # No volumeAttributes needed — everything is baked into the Dockerfile.
