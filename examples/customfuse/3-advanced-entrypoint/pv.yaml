apiVersion: v1
kind: PersistentVolume
metadata:
  name: juicefs-advanced-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: customfuseplugin.csi.alibabacloud.com
    volumeHandle: juicefs-advanced-pv
    volumeAttributes:
      fuseType: "juicefs"
      source: "redis://redis-host.default.svc:6379/1"
      # bucket: OSS bucket name, passed to entrypoint as $bucket.
      bucket: "my-jfs-data"
      # url: OSS endpoint, passed to entrypoint as $url.
      url: "oss-cn-hangzhou-internal.aliyuncs.com"
      # otherOpts: passed to entrypoint as $otherOpts. The advanced entrypoint
      # parses it into individual flags, enforces a per-pod cache quota, and
      # applies defaults for missing values.
      # Example: user requests 50GB cache, but entrypoint will cap to the quota (20GB).
      otherOpts: "--cache-size=51200 --writeback --prefetch=3"
    nodePublishSecretRef:
      name: juicefs-advanced-creds
      namespace: default
