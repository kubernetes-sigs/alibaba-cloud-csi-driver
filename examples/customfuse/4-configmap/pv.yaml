apiVersion: v1
kind: PersistentVolume
metadata:
  name: juicefs-configmap-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: customfuseplugin.csi.alibabacloud.com
    volumeHandle: juicefs-configmap-pv
    volumeAttributes:
      fuseType: "juicefs"
      source: "redis://redis-host.default.svc:6379/1"
      bucket: "my-jfs-data"
      url: "oss-cn-hangzhou-internal.aliyuncs.com"
      # Name of a ConfigMap in ack-csi-fuse namespace containing entrypoint.sh.
      # mount-proxy checks /etc/fuse-config/entrypoint.sh before the baked-in /entrypoint.sh.
      entrypointConfig: "juicefs-entrypoint"
    nodePublishSecretRef:
      name: juicefs-configmap-creds
      namespace: default
